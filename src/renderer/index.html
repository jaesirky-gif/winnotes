<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WinNotes</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar panel">
        <div class="traffic-lights" aria-hidden="true">
          <span class="traffic-light traffic-light-close"></span>
          <span class="traffic-light traffic-light-min"></span>
          <span class="traffic-light traffic-light-max"></span>
        </div>

        <header class="sidebar-header">
          <div>
            <p class="eyebrow">macOS Notes 风格</p>
            <h1>WinNotes</h1>
          </div>
          <button id="new-folder-button" class="ghost-button" type="button">新建文件夹</button>
        </header>

        <nav id="folder-nav" class="folder-nav" aria-label="文件夹列表"></nav>

        <footer class="sidebar-footer">
          <button id="new-note-button" class="primary-button" type="button">新建备忘录</button>
        </footer>
      </aside>

      <section class="list-panel panel">
        <header class="panel-header">
          <label class="search-box">
            <span>搜索</span>
            <input id="search-input" type="search" placeholder="搜索标题或内容" autocomplete="off" />
          </label>
        </header>

        <div class="list-summary">
          <div>
            <p id="list-context" class="summary-title">全部备忘录</p>
            <p id="list-subtitle" class="summary-subtitle">最近更新优先</p>
          </div>
          <span id="note-count" class="note-count">0</span>
        </div>

        <div id="note-list" class="note-list" aria-live="polite"></div>
      </section>

      <main class="editor-panel panel">
        <section id="empty-state" class="empty-state hidden">
          <p class="eyebrow">没有可显示的内容</p>
          <h2>创建第一条备忘录</h2>
          <p class="empty-copy">你可以先建立一个文件夹，再开始记录文本、清单和灵感。</p>
          <div class="empty-actions">
            <button id="empty-new-note-button" class="primary-button" type="button">新建备忘录</button>
            <button id="empty-new-folder-button" class="ghost-button" type="button">新建文件夹</button>
          </div>
        </section>

        <section id="editor-section" class="editor-section hidden">
          <header class="editor-header">
            <div class="editor-title-row">
              <input
                id="note-title-input"
                class="note-title-input"
                type="text"
                placeholder="无标题"
                autocomplete="off"
              />
              <div class="editor-actions">
                <button id="pin-note-button" class="toolbar-chip" type="button">置顶</button>
                <button id="delete-note-button" class="toolbar-chip danger" type="button">删除</button>
              </div>
            </div>

            <div class="editor-meta-row">
              <p id="note-meta" class="note-meta">最近编辑</p>
              <label class="folder-select-wrap">
                <span>所在文件夹</span>
                <select id="folder-select" class="folder-select"></select>
              </label>
            </div>

            <div class="format-toolbar" role="toolbar" aria-label="格式工具栏">
              <button class="toolbar-chip" data-format="bold" type="button">粗体</button>
              <button class="toolbar-chip" data-format="italic" type="button">斜体</button>
              <button class="toolbar-chip" data-format="underline" type="button">下划线</button>
              <button class="toolbar-chip" data-format="heading" type="button">标题</button>
              <button class="toolbar-chip" data-format="unordered" type="button">项目符号</button>
              <button class="toolbar-chip" data-format="ordered" type="button">编号</button>
              <button class="toolbar-chip" data-format="quote" type="button">引用</button>
              <button class="toolbar-chip" data-format="clear" type="button">清除格式</button>
            </div>
          </header>

          <div class="editor-surface">
            <div
              id="editor"
              class="editor"
              contenteditable="true"
              spellcheck="true"
              data-placeholder="开始记录..."
            ></div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
